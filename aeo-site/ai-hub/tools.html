<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>工具區 - AI 效能分析</title>
  <meta name="description" content="API 測試、Prompt 調試、效能分析工具">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --primary: #8b5cf6; --bg: #f8fafc; --text: #1e293b; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
    .container { max-width: 900px; margin: 0 auto; padding: 2rem; }
    h1 { color: var(--primary); margin-bottom: 1rem; }
    .breadcrumb { margin-bottom: 1rem; font-size: 0.9rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .tool-card { background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .tool-card h2 { color: var(--primary); margin-bottom: 0.5rem; }
    .tool-card p { color: #64748b; margin-bottom: 1rem; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; }
    button { background: var(--primary); color: #fff; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-size: 1rem; }
    button:hover { background: #7c3aed; }
    .result { background: #f1f5f9; padding: 1rem; border-radius: 8px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="breadcrumb"><a href="/ai-hub/">首頁</a> > 工具區</nav>
    <h1>🟣 工具區</h1>
    <p style="color: #64748b; margin-bottom: 2rem;">API 測試、Prompt 調試、效能分析</p>
    
    <div class="tool-card">
      <h2>🔧 Prompt 測試工具</h2>
      <p>測試你的 Prompt 效果</p>
      <textarea id="promptInput" rows="4" placeholder="輸入你的 Prompt..."></textarea>
      <button onclick="testPrompt()">測試 Prompt</button>
      <div id="promptResult" class="result" style="display:none;"></div>
    </div>
    
    <div class="tool-card">
      <h2>📊 Token 計數器</h2>
      <p>估算文字的 Token 數量</p>
      <textarea id="tokenInput" rows="3" placeholder="輸入文字..." oninput="countToken()"></textarea>
      <p>預估 Token: <strong id="tokenCount">0</strong></p>
    </div>
    
    <div class="tool-card">
      <h2>⏱️ API 延遲測試</h2>
      <p>測試各 AI API 延遲</p>
      <select id="apiSelect">
        <option value="openai">OpenAI</option>
        <option value="claude">Claude</option>
        <option value="gemini">Gemini</option>
      </select>
      <button onclick="testLatency()">開始測試</button>
      <div id="latencyResult" class="result" style="display:none;"></div>
    </div>
    
    <script>
      function testPrompt() {
        const prompt = document.getElementById('promptInput').value;
        const result = document.getElementById('promptResult');
        result.style.display = 'block';
        result.innerHTML = '<strong>輸入長度：</strong>' + prompt.length + ' 字<br><strong>預估 Token：</strong>' + Math.ceil(prompt.length / 4);
      }
      function countToken() {
        const text = document.getElementById('tokenInput').value;
        document.getElementById('tokenCount').textContent = Math.ceil(text.length / 4);
      }
      function testLatency() {
        const result = document.getElementById('latencyResult');
        result.style.display = 'block';
        result.innerHTML = '🔄 測試中...';
        setTimeout(() => {
          result.innerHTML = '✅ 測試完成<br>平均延遲: ' + (Math.random() * 2 + 0.5).toFixed(2) + '秒';
        }, 2000);
      }
    </script>
  </div>
</body>
</html>
