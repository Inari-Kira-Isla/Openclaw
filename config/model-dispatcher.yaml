# Model Dispatcher 配置

**更新日期**: 2026-02-19

---

## 預設策略

### 快速模式 (默認)
- **deepseek-coder:1.3b** - 最快回應 (776MB)
- 用途：日常查詢、快速任務

### 標準模式
- **llama3** - 平衡速度和質量 (4.7GB)
- 用途：一般對話、筆記

### 高質量模式
- **mistral** - 高質量輸出 (4.4GB)
- 用途：複雜推理

### 專業模式
- **codellama** - 程式碼專家 (3.8GB)
- 用途：程式開發

---

## Fallback 順序

```
deepseek-coder → llama3 → mistral → codellama → MiniMax
```

---

## 預熱腳本

### 快速預熱
```bash
./scripts/prewarm_models.sh
```

### Python 服務
```bash
python3 ./scripts/prewarm_service.py
```

