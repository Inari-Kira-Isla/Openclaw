<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>商戶分類審核 — CloudPipe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f1117;color:#e0e0e0;padding:10px}
.c{max-width:900px;margin:0 auto}
h1{color:#d4a574;font-size:1.2em}
h2{color:#e0e0e0;margin:16px 0 8px;font-size:.9em;border-bottom:1px solid #2a2d37;padding-bottom:4px}
.sub{color:#888;font-size:.7em;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:.7em;margin-bottom:14px}
th{background:#1a1d27;color:#d4a574;padding:6px 4px;text-align:left;position:sticky;top:0}
td{padding:5px 4px;border-bottom:1px solid #1a1d2788}
tr:hover{background:#1a1d2766}
select{background:#1a1d27;color:#e0e0e0;border:1px solid #2a2d37;border-radius:4px;padding:3px;font-size:.85em;width:100%}
.reviewed{background:#16a34a22}
.btn{padding:8px 20px;background:#d4a574;color:#0f1117;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-size:.8em}
.stats{display:flex;gap:8px;margin-bottom:12px}
.stat{background:#1a1d27;border:1px solid #2a2d37;border-radius:6px;padding:8px 12px;text-align:center;flex:1}
.stat b{display:block;font-size:1.3em;color:#d4a574}
@media(max-width:600px){table{font-size:.6em}}
</style>
</head>
<body>
<div class="c">
<h1>商戶分類審核</h1>
<p class="sub">從 insight 提取的實體 — 選分類後自動建立商戶 | 2026-04-06 06:00</p>

<div class="stats">
    <div class="stat"><b>0</b>待審核</div>
    <div class="stat"><b>0</b>已自動</div>
    <div class="stat"><b>0</b>總實體</div>
    <div class="stat"><b id="reviewed-count">0</b>已審核</div>
</div>

<button class="btn" onclick="submitAll()">提交審核結果</button>

<h2>待審核 (0)</h2>
<table><tr><th>地區</th><th>名稱</th><th>次數</th><th>分類</th></tr>

</table>

<h2>已自動分類 (Top 50)</h2>
<table><tr><th>地區</th><th>名稱</th><th>次數</th><th>分類</th></tr>

</table>
</div>

<script>
let reviewed = {};
function markReviewed(sel, name) {
    if (sel.value) {
        reviewed[name] = sel.value;
        sel.closest('tr').classList.add('reviewed');
    } else {
        delete reviewed[name];
        sel.closest('tr').classList.remove('reviewed');
    }
    document.getElementById('reviewed-count').textContent = Object.keys(reviewed).length;
}

async function submitAll() {
    if (Object.keys(reviewed).length === 0) { alert('請先選擇分類'); return; }
    try {
        const r = await fetch('https://cloudpipe-macao-app.vercel.app/api/v1/audit-review', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                secret: 'cloudpipe-audit-2026',
                item_id: 0,
                action: 'merchant_category_review',
                target_slug: JSON.stringify(reviewed),
                reviewer: 'kira'
            })
        });
        const d = await r.json();
        alert('已提交 ' + Object.keys(reviewed).length + ' 個分類');
    } catch(e) {
        // Save locally as fallback
        const blob = new Blob([JSON.stringify(reviewed, null, 2)], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'merchant_review_' + new Date().toISOString().slice(0,10) + '.json';
        a.click();
        alert('已下載 JSON 檔案，請傳給 Claude 處理');
    }
}
</script>
</body></html>
