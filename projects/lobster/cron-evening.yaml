# Lobster 晚間排程 Cron Jobs

# 晚間自動化工作流

lobster-evening-review:
  cron: "0 22 * * *"
  enabled: true
  description: "發布預排程內容"
  command: "cd /Users/ki/.openclaw/workspace/projects/lobster && node dist/index.js review"

lobster-midnight-study:
  cron: "0 23 * * *"
  enabled: true
  description: "AI 團隊凌晨精進討論"
  command: "cd /Users/ki/.openclaw/workspace/projects/lobster && node dist/index.js detect"

lobster-daily-summary:
  cron: "0 0 * * *"
  enabled: true
  description: "數據回顧與每日總結"
  command: "cd /Users/ki/.openclaw/workspace/projects/lobster && node dist/index.js weekly"
