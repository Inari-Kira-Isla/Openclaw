<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9宮格圖提示詞生成器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', 'PingFang TC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .upload-section {
            border: 3px dashed #ccc;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }
        .upload-section:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        .upload-section input {
            display: none;
        }
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .preview-grid img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .option-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-weight: bold;
            color: #555;
        }
        select, input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .language-toggle {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .lang-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        .lang-btn.active {
            background: #667eea;
            color: white;
        }
        .lang-btn:not(.active) {
            background: #f0f0f0;
            color: #666;
        }
        .generate-btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        .generate-btn:hover {
            transform: scale(1.02);
        }
        .output {
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .output h3 {
            color: #333;
            margin-bottom: 15px;
        }
        .output pre {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            white-space: pre-wrap;
        }
        .copy-btn {
            display: block;
            margin: 15px auto 0;
            padding: 12px 30px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 9宮格圖提示詞生成器</h1>
        
        <div class="upload-section" onclick="document.getElementById('fileInput').click()">
            <input type="file" id="fileInput" accept="image/*" multiple onchange="handleFiles(this.files)">
            <p>📁 點擊上傳參考圖片（可多張）</p>
            <p style="color: #999; font-size: 14px;">支援 JPG, PNG, WebP</p>
        </div>
        
        <div class="preview-grid" id="previewGrid"></div>
        
        <div class="options">
            <div class="option-group">
                <label>網格類型</label>
                <select id="gridType">
                    <option value="3x3">3x3 九宮格</option>
                    <option value="2x2">2x2 四宮格</option>
                    <option value="4x4">4x4 十六宮格</option>
                </select>
            </div>
            <div class="option-group">
                <label>分辨率</label>
                <select id="resolution">
                    <option value="8K">8K</option>
                    <option value="4K">4K</option>
                    <option value="2K">2K</option>
                    <option value="1080p">1080p</option>
                </select>
            </div>
            <div class="option-group">
                <label>畫幅比例</label>
                <select id="aspectRatio">
                    <option value="16:9">16:9 寬銀幕</option>
                    <option value="4:3">4:3 標準</option>
                    <option value="1:1">1:1 方形</option>
                    <option value="9:16">9:16 短影片</option>
                </select>
            </div>
            <div class="option-group">
                <label>光源數量</label>
                <select id="lightCount">
                    <option value="9">9個不同光源</option>
                    <option value="5">5個不同光源</option>
                    <option value="3">3個不同光源</option>
                </select>
            </div>
        </div>
        
        <div class="language-toggle">
            <button class="lang-btn active" onclick="setLang('zh')">中文</button>
            <button class="lang-btn" onclick="setLang('en')">English</button>
        </div>
        
        <button class="generate-btn" onclick="generatePrompt()">✨ 生成提示詞</button>
        
        <div class="output" id="output" style="display: none;">
            <h3>📝 生成的提示詞</h3>
            <pre id="promptText"></pre>
            <button class="copy-btn" onclick="copyPrompt()">📋 複製提示詞</button>
        </div>
    </div>
    
    <script>
        let currentLang = 'zh';
        let uploadedImages = [];
        
        function handleFiles(files) {
            const grid = document.getElementById('previewGrid');
            grid.innerHTML = '';
            uploadedImages = Array.from(files);
            
            uploadedImages.forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    grid.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
        
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }
        
        function generatePrompt() {
            const gridType = document.getElementById('gridType').value;
            const resolution = document.getElementById('resolution').value;
            const aspectRatio = document.getElementById('aspectRatio').value;
            const lightCount = document.getElementById('lightCount').value;
            
            const gridSize = gridType === '3x3' ? 9 : gridType === '2x2' ? 4 : 16;
            
            let prompt = '';
            
            if (currentLang === 'zh') {
                prompt = `根據參考圖片，產生一張具有聚集力的[${gridType}]網格影像，
包含在同一環境中的[${lightCount}]個不同的光源鏡頭，
嚴格保持人物/物體、服裝和光線的一致性，
[${resolution}]分辨率，[${aspectRatio}]畫幅。

`;
            } else {
                prompt = `Based on the reference image, generate a cohesive [${gridType}] grid image,
containing [${lightCount}] different lighting angles in the same environment,
strictly maintaining consistency in characters/objects, costumes, and lighting,
[${resolution}] resolution, [${aspectRatio}] aspect ratio.

`;
            }
            
            for (let i = 1; i <= gridSize; i++) {
                const lensNum = i.toString().padStart(2, '0');
                if (currentLang === 'zh') {
                    prompt += `鏡頭${lensNum}：${getSceneDescription(i)}\n`;
                } else {
                    prompt += `Lens ${lensNum}: ${getSceneDescription(i)}\n`;
                }
            }
            
            document.getElementById('promptText').textContent = prompt;
            document.getElementById('output').style.display = 'block';
        }
        
        function getSceneDescription(num) {
            const scenes = currentLang === 'zh' ? [
                '特寫鏡頭，柔和正面光',
                '過肩鏡頭，側光營造層次',
                '全景鏡頭，頂光照明',
                '中景鏡頭，逆光輪廓',
                '側拍鏡頭，蝴蝶光效果',
                '廣角鏡頭，環境光完整',
                '低角度鏡頭，底光突顯主體',
                '高角度鏡頭，自然散射光',
                '縱深鏡頭，層次光影變化'
            ] : [
                'Close-up, soft front lighting',
                'Over-the-shoulder, side light for depth',
                'Wide shot, top lighting',
                'Medium shot, backlight for silhouette',
                'Profile shot, butterfly lighting effect',
                'Wide angle, ambient light',
                'Low angle, bottom light highlighting',
                'High angle, natural diffused light',
                'Depth shot, layered light variation'
            ];
            return scenes[(num - 1) % scenes.length];
        }
        
        function copyPrompt() {
            const text = document.getElementById('promptText').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert(currentLang === 'zh' ? '✅ 已複製！' : '✅ Copied!');
            });
        }
    </script>
</body>
</html>
