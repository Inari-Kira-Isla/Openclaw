type: gene_capsule
version: "1.0"
id: "gc_20260220_self_evolution"
name: "自我進化訓練 Prompt"
description: "用於每日 AI 趨勢學習的標準化 Prompt"

content:
  prompt: |
    執行自我進化訓練（主題輪換）：
    
    ## 今日主題
    {選擇一個主題：AI 模型、自動化工具、本地 LLM、Agent 架構、系統優化}
    
    1. 優先使用 smart-search.sh 搜尋 {主題} 最新資訊
    2. 如果失敗，使用 serper-search.sh
    3. MiniMax 分析資訊
    4. 記錄關鍵發現
    5. 存入記憶
    
    API: You.com + Serper
    
    ## 避免重複
    - 檢查上次主題，選擇不同主題
    - 合併相似發現
    
    ## 錯誤處理
    - 搜尋失敗: 回報錯誤，使用備用來源
    - API 逾時: 切換模型重試
    - 無結果: 嘗試其他關鍵字

  context: |
    主題輪換系統
    模型: MiniMax-M2.5

  examples:
    - input: "執行自我進化訓練"
      output: "選擇 AI 模型主題，搜尋最新資訊，存入記憶"
    
  results:
    success_rate: 0.85
    avg_duration: "2m"

