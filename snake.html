<!DOCTYPE html>
<html>
<head>
  <title>🐍 Pokemon Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #1a1a2e 0%, #0f0f23 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', cursive;
      color: #fff;
    }
    
    h1 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #ffcb05;
      text-shadow: 3px 3px 0 #3c5aa6, -1px -1px 0 #c7a008;
    }
    
    .game-container {
      padding: 10px;
      background: #2a75bb;
      border-radius: 12px;
      border: 4px solid #ffcb05;
      box-shadow: 0 8px 0 #1a5099, 0 12px 20px rgba(0,0,0,0.5);
    }
    
    canvas {
      display: block;
      border-radius: 4px;
      background: #202020;
      image-rendering: pixelated;
    }
    
    #score {
      text-align: center;
      font-size: 12px;
      margin: 10px 0;
      color: #ffcb05;
    }
    
    #message {
      text-align: center;
      font-size: 8px;
      min-height: 14px;
      color: #fff;
    }
    
    .controls { margin-top: 10px; display: grid; gap: 5px; }
    
    .btn {
      background: #3c5aa6;
      border: 2px solid #ffcb05;
      color: #fff;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 6px;
      font-family: inherit;
    }
    
    .btn:hover { background: #5a8fd4; }
    .btn:active { transform: translateY(2px); }
    .row { display: flex; gap: 5px; justify-content: center; }
    .restart-btn { background: #ff3333; width: 100%; }
    .restart-btn:hover { background: #ff6666; }
  </style>
</head>
<body>
  <h1>🎮 POKEMON SNAKE</h1>
  
  <div class="game-container">
    <canvas id="game" width="380" height="380"></canvas>
    <div id="score">SCORE: 0</div>
    <div id="message">USE ARROW KEYS TO START</div>
    
    <div class="controls">
      <div class="row"><button class="btn" onmousedown="setDir(0,-1)">▲</button></div>
      <div class="row">
        <button class="btn" onmousedown="setDir(-1,0)">◀</button>
        <button class="btn" onmousedown="togglePause()">❚❚</button>
        <button class="btn" onmousedown="setDir(1,0)">▶</button>
      </div>
      <div class="row"><button class="btn" onmousedown="setDir(0,1)">▼</button></div>
      <div class="row"><button class="btn restart-btn" onmousedown="reset()">RESTART</button></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const msgEl = document.getElementById('message');

    const grid = 38;
    const tileCount = 10;
    
    // Pokemon sprites from Pokemon Showdown
    const headSprites = [
      'https://play.pokemonshowdown.com/sprites/xy/charizard.png',
      'https://play.pokemonshowdown.com/sprites/xy/blastoise.png',
      'https://play.pokemonshowdown.com/sprites/xy/venusaur.png',
      'https://play.pokemonshowdown.com/sprites/xy/pikachu.png'
    ];
    
    const bodySprites = [
      'https://play.pokemonshowdown.com/sprites/xy/gyarados.png',
      'https://play.pokemonshowdown.com/sprites/xy/dragonite.png',
      'https://play.pokemonshowdown.com/sprites/xy/gengar.png',
      'https://play.pokemonshowdown.com/sprites/xy/alakazam.png'
    ];
    
    const foodSprites = [
      'https://play.pokemonshowdown.com/sprites/xy/mewtwo.png',
      'https://play.pokemonshowdown.com/sprites/xy/rayquaza.png',
      'https://play.pokemonshowdown.com/sprites/xy/kyogre.png',
      'https://play.pokemonshowdown.com/sprites/xy/groudon.png'
    ];
    
    const headImages = [];
    const bodyImages = [];
    const foodImages = [];
    
    // Load images
    let imagesLoaded = 0;
    const totalImages = headSprites.length + bodySprites.length + foodSprites.length;
    
    function onImageLoad() {
      imagesLoaded++;
      if (imagesLoaded >= totalImages) {
        draw();
      }
    }
    
    headSprites.forEach(src => {
      const img = new Image();
      img.onload = onImageLoad;
      img.src = src;
      headImages.push(img);
    });
    
    bodySprites.forEach(src => {
      const img = new Image();
      img.onload = onImageLoad;
      img.src = src;
      bodyImages.push(img);
    });
    
    foodSprites.forEach(src => {
      const img = new Image();
      img.onload = onImageLoad;
      img.src = src;
      foodImages.push(img);
    });

    let snake = [{x: 5, y: 5}];
    let food = {x: 7, y: 7};
    let dx = 0, dy = 0;
    let score = 0;
    let paused = true;
    let gameOver = false;
    let headImg = headImages[0];
    let foodImg = foodImages[0];

    function setDir(x, y) {
      if (paused && !gameOver) {
        paused = false;
        msgEl.textContent = '';
        if (dx === 0 && dy === 0) { dx = 1; dy = 0; }
      }
      if (dx !== -x || dy !== -y) { dx = x; dy = y; }
      headImg = headImages[Math.floor(Math.random() * headImages.length)];
    }

    function togglePause() {
      if (gameOver) reset();
      else { paused = !paused; msgEl.textContent = paused ? 'PAUSED' : ''; }
    }

    function reset() {
      snake = [{x: 5, y: 5}];
      dx = 0; dy = 0;
      score = 0;
      gameOver = false;
      paused = true;
      scoreEl.textContent = 'SCORE: 0';
      msgEl.textContent = 'USE ARROW KEYS TO START';
      foodImg = foodImages[0];
      draw();
    }

    function draw() {
      ctx.fillStyle = '#202020';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Grid
      ctx.strokeStyle = '#303030';
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * grid, 0);
        ctx.lineTo(i * grid, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, i * grid);
        ctx.lineTo(canvas.width, i * grid);
        ctx.stroke();
      }

      // Food
      if (foodImg.complete) {
        ctx.drawImage(foodImg, food.x * grid + 3, food.y * grid + 3, grid - 6, grid - 6);
      }

      // Snake
      snake.forEach((part, i) => {
        const img = i === 0 ? headImg : bodyImages[i % bodyImages.length];
        if (img.complete) {
          ctx.drawImage(img, part.x * grid + 3, part.y * grid + 3, grid - 6, grid - 6);
        }
      });
    }

    function update() {
      if (paused || gameOver || (dx === 0 && dy === 0)) return;

      const head = {x: snake[0].x + dx, y: snake[0].y + dy};

      if (head.x < 0 || head.x >= tileCount || 
          head.y < 0 || head.y >= tileCount ||
          snake.some(p => p.x === head.x && p.y === head.y)) {
        gameOver = true;
        msgEl.textContent = 'GAME OVER!';
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreEl.textContent = 'SCORE: ' + score;
        foodImg = foodImages[Math.floor(Math.random() * foodImages.length)];
        
        do {
          food = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
          };
        } while (snake.some(p => p.x === food.x && p.y === food.y));
      } else {
        snake.pop();
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === ' ') { togglePause(); return; }
      if (e.key === 'ArrowUp') setDir(0, -1);
      if (e.key === 'ArrowDown') setDir(0, 1);
      if (e.key === 'ArrowLeft') setDir(-1, 0);
      if (e.key === 'ArrowRight') setDir(1, 0);
    });

    // Use timeout to wait for initial images
    setTimeout(() => draw(), 500);
    setInterval(() => { update(); draw(); }, 250);
  </script>
</body>
</html>
